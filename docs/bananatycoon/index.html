<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banana Tycoon</title>
    <style>
        :root {
            --bg-dark: #14240f;
            --bg-mid: #24381a;
            --bg-light: #38732e;
            --card-bg: rgba(20, 36, 15, 0.9);
            --text: #f2ebbf;
            --muted: #bfd9b2;
            --accent: #d19429;
            --accent-hover: #ffdb57;
            --accent-text: #1f1805;
            --border: rgba(255, 219, 87, 0.35);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            font-family: Arial, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top, rgba(56, 115, 46, 0.35), transparent 40%),
                linear-gradient(180deg, var(--bg-mid), var(--bg-dark)),
                url("MainLogo_background.png") center center / 260px repeat;
        }

        .card {
            width: 100%;
            max-width: 760px;
            padding: 40px 32px 24px;
            border: 1px solid var(--border);
            border-radius: 28px;
            background: var(--card-bg);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.38);
            text-align: center;
            backdrop-filter: blur(4px);
        }

        .logo {
            width: min(220px, 55vw);
            height: auto;
            margin-bottom: 20px;
            filter: drop-shadow(0 12px 30px rgba(0, 0, 0, 0.35));
        }

        h1 {
            margin: 0 0 12px;
            font-size: clamp(2.2rem, 5vw, 3.5rem);
        }

        .intro {
            margin: 0 0 32px;
            color: var(--muted);
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .message {
            margin: 0 0 16px;
            font-size: 1.15rem;
            line-height: 1.5;
        }

        .store-link {
            display: inline-block;
            padding: 14px 28px;
            border-radius: 999px;
            background: var(--accent);
            color: var(--accent-text);
            font-weight: bold;
            text-decoration: none;
            transition: background-color 0.2s ease, transform 0.2s ease;
            box-shadow: 0 8px 18px rgba(209, 148, 41, 0.28);
        }

        .store-link:hover,
        .store-link:focus-visible {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        footer {
            margin-top: 48px;
            font-size: 0.95rem;
            color: var(--muted);
        }

        footer a {
            color: inherit;
            text-decoration: none;
        }

        footer a:hover,
        footer a:focus-visible {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <main class="card">
        <img class="logo" src="MainLogo_foreground.png" alt="Banana Tycoon logo">
        <h1>Banana Tycoon</h1>
        <p class="intro">Build your banana empire in a world of jungle finance, upgrades, and big golden ambitions.</p>
        <p class="message">Get the app on the Google Play Store.</p>
        <a class="store-link" href="#">Coming soon</a>

        <footer>
            <a href="privacypolicy/">Privacy Policy</a>
        </footer>
    </main>
</body>
</html>
